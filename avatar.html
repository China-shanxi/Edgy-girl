<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>头像馆 - 精神小妹专属天地</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body.dark{background:#0a0a0a;color:#fff;}
        body.light{background:#fff0f6;color:#111;}
        .heart{position:fixed;pointer-events:none;animation:heartMove 8s linear infinite;opacity:0.7;z-index:-1;}
        @keyframes heartMove{
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
        }
        .neon-text{
            font-size:32px;font-weight:bold;
            color:#fff;
            text-shadow:
                0 0 5px #ff2e92,
                0 0 10px #ff2e92,
                0 0 20px #ff2e92,
                0 0 40px #d83cff;
        }
        .notice{
            width:100%;height:35px;background:#ff2e92;line-height:35px;overflow:hidden;
        }
        .notice-scroll{
            white-space:nowrap;animation:scroll 20s linear infinite;color:#111;font-weight:bold;
        }
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        nav{width:100%;background:#181818;padding:15px 0;text-align:center;border-bottom:2px solid #ff2e92;}
        nav a{
            color:#ffb8d8;text-decoration:none;font-size:16px;margin:0 12px;padding:8px 14px;
            border-radius:20px;transition:0.3s;
        }
        nav a:hover{background:#ff2e92;color:#000;box-shadow:0 0 12px #ff2e92;}
        .box{
            width:90%;max-width:1200px;margin:30px auto;background:#151515;padding:25px;
            border-radius:18px;border:1px solid #ff2e9280;box-shadow:0 0 25px #d83cff40;
        }
        .box h2{margin-bottom:20px;color:#ff2e92;border-left:4px solid #ff2e92;padding-left:10px;}
        .avatar-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
            gap:20px;
        }
        .avatar-card{
            background:#0f0f0f;
            padding:15px;
            border-radius:12px;
            text-align:center;
            border:1px solid #ff2e9260;
        }
        .avatar-card img{
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius:10px;
            cursor:pointer;
        }
        .btn{
            display:inline-block;padding:10px 22px;background:linear-gradient(45deg,#ff2e92,#d83cff);
            color:#000;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:8px;
            transition:0.3s;
        }
        .btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff2e92;}
        .theme-toggle{
            position:fixed;top:15px;right:15px;z-index:999;
        }
        footer{margin-top:50px;padding:20px;text-align:center;color:#aaa;font-size:14px;border-top:1px solid #222;}
    </style>
</head>
<body class="dark">
    <div class="notice">
        <div class="notice-scroll">头像馆｜甜丧头像｜暗黑非主流｜情侣头像｜闪图头像｜一键生成朋友圈配图</div>
    </div>

    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()">切换夜间模式</button>
    </div>

    <div style="text-align:center;margin:25px 0;">
        <h1 class="neon-text">头像馆</h1>
        <p style="color:#ffb8d8;margin-top:8px;">挑一个属于你的非主流头像</p>
    </div>

    <nav>
        <a href="index.html">首页</a>
        <a href="avatar.html">头像馆</a>
        <a href="yulu.html">伤感语录</a>
        <a href="dress.html">穿搭分享</a>
        <a href="submit.html">自拍投稿</a>
        <a href="music.html">音乐播放器</a>
        <a href="message.html">留言板</a>
        <a href="material.html">素材下载</a>
        <a href="filter.html">在线滤镜</a>
        <a href="card.html">个人资料卡</a>
    </nav>

    <div class="box">
        <h2>精选头像</h2>
        <div class="avatar-grid" id="avatarGrid"></div>
    </div>

    <div class="box">
        <h2>头像工具</h2>
        <button class="btn" onclick="refreshAvatars()">随机换一批</button>
        <button class="btn" onclick="createAvatarPoster()">生成朋友圈配图</button>
    </div>

    <footer>
        精神小妹专属天地 © 2026
    </footer>

    <canvas id="avatarPosterCanvas" style="display:none;"></canvas>

    <script>
        const avatarImages = [
            'https://picsum.photos/id/1027/300/300',
            'https://picsum.photos/id/1025/300/300',
            'https://picsum.photos/id/1011/300/300',
            'https://picsum.photos/id/1012/300/300',
            'https://picsum.photos/id/1029/300/300',
            'https://picsum.photos/id/1035/300/300',
            'https://picsum.photos/id/1039/300/300',
            'https://picsum.photos/id/1049/300/300',
            'https://picsum.photos/id/1059/300/300',
            'https://picsum.photos/id/1062/300/300',
            'https://picsum.photos/id/1069/300/300',
            'https://picsum.photos/id/1074/300/300'
        ];

        function renderAvatars(){
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            avatarImages.forEach((src,i)=>{
                const card = document.createElement('div');
                card.className = 'avatar-card';
                card.innerHTML = `
                    <img src="${src}" alt="头像${i+1}" onclick="selectAvatar(${i})">
                    <p style="margin:10px 0;color:#ffb8d8;">头像 ${i+1}</p>
                    <button class="btn" onclick="downloadAvatar(${i})">保存</button>
                `;
                grid.appendChild(card);
            });
        }

        function refreshAvatars(){
            avatarImages.push(avatarImages.shift());
            renderAvatars();
        }

        let selectedAvatar = '';
        function selectAvatar(i){
            selectedAvatar = avatarImages[i];
            alert('已选中头像：' + (i+1));
        }

        function downloadAvatar(i){
            let link = document.createElement('a');
            link.href = avatarImages[i];
            link.download = '精神小妹头像.jpg';
            link.click();
        }

        function createAvatarPoster(){
            if(!selectedAvatar){
                alert('请先点击选择一张头像');
                return;
            }
            const canvas = document.getElementById('avatarPosterCanvas');
            canvas.width = 750;
            canvas.height = 1334;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createLinearGradient(0,0,750,1334);
            gradient.addColorStop(0,'#ff2e92');
            gradient.addColorStop(1,'#111');
            ctx.fillStyle = gradient;
            ctx.fillRect(0,0,750,1334);

            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = selectedAvatar;
            img.onload = function(){
                ctx.save();
                ctx.beginPath();
                ctx.arc(375,500,180,0,Math.PI*2);
                ctx.clip();
                ctx.drawImage(img,195,320,360,360);
                ctx.restore();

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 36px "微软雅黑"';
                ctx.textAlign = 'center';
                ctx.fillText('精神小妹专属头像',375,800);

                ctx.font = '24px "微软雅黑"';
                ctx.fillStyle = '#ffb8d8';
                ctx.fillText('不被定义 · 独一份风格',375,860);

                const link = document.createElement('a');
                link.download = '头像朋友圈配图.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }
        }

        function createHeart(){
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random()*100+'vw';
            heart.style.fontSize = Math.random()*20+10+'px';
            heart.style.color = ['#ff2e92','#d83cff','#ffd700'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),8000);
        }
        setInterval(createHeart,300);

        function toggleTheme(){
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        renderAvatars();
    </script>
</body>
</html>
