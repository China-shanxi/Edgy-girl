<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>素材下载 - 精神小妹专属天地</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body.dark{background:#0a0a0a;color:#fff;}
        body.light{background:#fff0f6;color:#111;}
        .heart{position:fixed;pointer-events:none;animation:heartMove 8s linear infinite;opacity:0.7;z-index:-1;}
        @keyframes heartMove{
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
        }
        .neon-text{
            font-size:32px;font-weight:bold;
            color:#fff;
            text-shadow:
                0 0 5px #ff2e92,
                0 0 10px #ff2e92,
                0 0 20px #ff2e92,
                0 0 40px #d83cff;
        }
        .notice{
            width:100%;height:35px;background:#ff2e92;line-height:35px;overflow:hidden;
        }
        .notice-scroll{
            white-space:nowrap;animation:scroll 20s linear infinite;color:#111;font-weight:bold;
        }
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        nav{width:100%;background:#181818;padding:15px 0;text-align:center;border-bottom:2px solid #ff2e92;}
        nav a{
            color:#ffb8d8;text-decoration:none;font-size:16px;margin:0 12px;padding:8px 14px;
            border-radius:20px;transition:0.3s;
        }
        nav a:hover{background:#ff2e92;color:#000;box-shadow:0 0 12px #ff2e92;}
        .box{
            width:90%;max-width:1200px;margin:30px auto;background:#151515;padding:25px;
            border-radius:18px;border:1px solid #ff2e9280;box-shadow:0 0 25px #d83cff40;
        }
        .box h2{margin-bottom:20px;color:#ff2e92;border-left:4px solid #ff2e92;padding-left:10px;}
        .material-grid{
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
            gap:20px;
        }
        .material-card{
            background:#0f0f0f;
            padding:15px;
            border-radius:12px;
            text-align:center;
            border:1px solid #ff2e9260;
        }
        .material-card img{
            width:100%;height:160px;object-fit:cover;border-radius:10px;
        }
        .btn{
            display:inline-block;padding:10px 22px;background:linear-gradient(45deg,#ff2e92,#d83cff);
            color:#000;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:8px;
            transition:0.3s;
        }
        .btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff2e92;}
        .theme-toggle{
            position:fixed;top:15px;right:15px;z-index:999;
        }
        footer{margin-top:50px;padding:20px;text-align:center;color:#aaa;font-size:14px;border-top:1px solid #222;}
    </style>
</head>
<body class="dark">
    <div class="notice">
        <div class="notice-scroll">素材库｜QQ空间闪图｜非主流GIF背景｜爱心边框｜表情包｜氛围感壁纸｜一键下载</div>
    </div>

    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()">切换夜间模式</button>
    </div>

    <div style="text-align:center;margin:25px 0;">
        <h1 class="neon-text">素材下载库</h1>
        <p style="color:#ffb8d8;margin-top:8px;">海量非主流动态GIF、背景、边框素材</p>
    </div>

    <nav>
        <a href="index.html">首页</a>
        <a href="avatar.html">头像馆</a>
        <a href="yulu.html">伤感语录</a>
        <a href="dress.html">穿搭分享</a>
        <a href="submit.html">自拍投稿</a>
        <a href="music.html">音乐播放器</a>
        <a href="message.html">留言板</a>
        <a href="material.html">素材下载</a>
        <a href="filter.html">在线滤镜</a>
        <a href="card.html">个人资料卡</a>
    </nav>

    <div class="box">
        <h2>动态GIF背景素材（可切换全站背景）</h2>
        <div class="material-grid" id="gifGrid"></div>
    </div>

    <div class="box">
        <h2>静态壁纸/边框素材</h2>
        <div class="material-grid" id="staticGrid"></div>
    </div>

    <footer>
        精神小妹专属天地 © 2026 | 素材仅供个人使用，禁止商用
    </footer>

    <script>
        // GIF动态背景素材
        const gifList = [
            {src:"https://picsum.photos/id/1032/300/300",name:"粉黑闪爱心GIF",type:"gif"},
            {src:"https://picsum.photos/id/1044/300/300",name:"霓虹渐变背景",type:"gif"},
            {src:"https://picsum.photos/id/1054/300/300",name:"飘落星星动态图",type:"gif"},
            {src:"https://picsum.photos/id/1064/300/300",name:"土酷镭射闪图",type:"gif"}
        ]
        // 静态素材
        const staticList = [
            {src:"https://picsum.photos/id/1015/300/300",name:"暗黑边框素材"},
            {src:"https://picsum.photos/id/1018/300/300",name:"甜丧氛围感壁纸"},
            {src:"https://picsum.photos/id/1022/300/300",name:"爱心分割线素材"},
            {src:"https://picsum.photos/id/1036/300/300",name:"非主流文字底图"}
        ]

        // 渲染GIF素材
        function renderGif(){
            const box = document.getElementById('gifGrid');
            gifList.forEach(item=>{
                const card = document.createElement('div');
                card.className = 'material-card';
                card.innerHTML = `
                    <img src="${item.src}" alt="${item.name}">
                    <p style="color:#ffb8d8;margin:10px 0">${item.name}</p>
                    <button class="btn" onclick="downloadMat('${item.src}','${item.name}')">下载</button>
                    <button class="btn" onclick="setBg('${item.src}')">设为全站背景</button>
                `
                box.appendChild(card);
            })
        }
        // 渲染静态素材
        function renderStatic(){
            const box = document.getElementById('staticGrid');
            staticList.forEach(item=>{
                const card = document.createElement('div');
                card.className = 'material-card';
                card.innerHTML = `
                    <img src="${item.src}" alt="${item.name}">
                    <p style="color:#ffb8d8;margin:10px 0">${item.name}</p>
                    <button class="btn" onclick="downloadMat('${item.src}','${item.name}')">下载</button>
                `
                box.appendChild(card);
            })
        }

        // 下载素材
        function downloadMat(src,name){
            const a = document.createElement('a');
            a.href = src;
            a.download = name + ".jpg";
            a.click();
        }
        // 切换全局GIF背景（拓展功能）
        function setBg(url){
            localStorage.setItem('spiritBgUrl',url);
            document.body.style.backgroundImage = `url(${url})`;
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundAttachment = "fixed";
            alert("背景切换成功！刷新页面永久生效");
        }

        // 读取本地保存的背景
        function loadSaveBg(){
            const saveBg = localStorage.getItem('spiritBgUrl');
            if(saveBg){
                document.body.style.backgroundImage = `url(${saveBg})`;
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundAttachment = "fixed";
            }
        }

        // 漂浮爱心
        function createHeart(){
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random()*100+'vw';
            heart.style.fontSize = Math.random()*20+10+'px';
            heart.style.color = ['#ff2e92','#d83cff','#ffd700'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),8000);
        }
        setInterval(createHeart,300);

        function toggleTheme(){
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        // 初始化
        loadSaveBg();
        renderGif();
        renderStatic();
    </script>
</body>
</html>
