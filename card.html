<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人资料卡 - 精神小妹专属天地</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body.dark{background:#0a0a0a;color:#fff;}
        body.light{background:#fff0f6;color:#111;}
        .heart{position:fixed;pointer-events:none;animation:heartMove 8s linear infinite;opacity:0.7;z-index:-1;}
        @keyframes heartMove{
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
        }
        .neon-text{
            font-size:32px;font-weight:bold;
            color:#fff;
            text-shadow:
                0 0 5px #ff2e92,
                0 0 10px #ff2e92,
                0 0 20px #ff2e92,
                0 0 40px #d83cff;
        }
        .notice{
            width:100%;height:35px;background:#ff2e92;line-height:35px;overflow:hidden;
        }
        .notice-scroll{
            white-space:nowrap;animation:scroll 20s linear infinite;color:#111;font-weight:bold;
        }
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        nav{width:100%;background:#181818;padding:15px 0;text-align:center;border-bottom:2px solid #ff2e92;}
        nav a{
            color:#ffb8d8;text-decoration:none;font-size:16px;margin:0 12px;padding:8px 14px;
            border-radius:20px;transition:0.3s;
        }
        nav a:hover{background:#ff2e92;color:#000;box-shadow:0 0 12px #ff2e92;}
        .box{
            width:90%;max-width:1200px;margin:30px auto;background:#151515;padding:25px;
            border-radius:18px;border:1px solid #ff2e9280;box-shadow:0 0 25px #d83cff40;
        }
        .box h2{margin-bottom:20px;color:#ff2e92;border-left:4px solid #ff2e92;padding-left:10px;}
        input,textarea,select{
            width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ff2e92;background:#111;color:#fff;font-size:16px;
        }
        .btn{
            display:inline-block;padding:10px 22px;background:linear-gradient(45deg,#ff2e92,#d83cff);
            color:#000;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:8px;
            transition:0.3s;
        }
        .btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff2e92;}
        .theme-toggle{
            position:fixed;top:15px;right:15px;z-index:999;
        }
        footer{margin-top:50px;padding:20px;text-align:center;color:#aaa;font-size:14px;border-top:1px solid #222;}
    </style>
</head>
<body class="dark">
    <div class="notice">
        <div class="notice-scroll">个人资料卡｜自定义昵称/签名/发色/标签｜一键生成朋友圈长图保存</div>
    </div>

    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()">切换夜间模式</button>
    </div>

    <div style="text-align:center;margin:25px 0;">
        <h1 class="neon-text">个人资料卡生成器</h1>
        <p style="color:#ffb8d8;margin-top:8px;">制作专属精神小妹个人名片</p>
    </div>

    <nav>
        <a href="index.html">首页</a>
        <a href="avatar.html">头像馆</a>
        <a href="yulu.html">伤感语录</a>
        <a href="dress.html">穿搭分享</a>
        <a href="submit.html">自拍投稿</a>
        <a href="music.html">音乐播放器</a>
        <a href="message.html">留言板</a>
        <a href="material.html">素材下载</a>
        <a href="filter.html">在线滤镜</a>
        <a href="card.html">个人资料卡</a>
    </nav>

    <div class="box">
        <h2>填写个人信息</h2>
        <input type="text" id="cardName" placeholder="你的昵称">
        <input type="text" id="cardSign" placeholder="个性签名">
        <input type="text" id="cardHair" placeholder="发色/风格标签（如粉紫渐变、暗黑拽姐）">
        <textarea id="cardLove" rows="3" placeholder="喜欢的文案/爱好"></textarea>
        <button class="btn" onclick="createCardImg()">生成资料卡图片</button>
    </div>

    <footer>
        精神小妹专属天地 © 2026
    </footer>

    <canvas id="cardCanvas" style="display:none;"></canvas>

    <script>
        function createCardImg(){
            const name = document.getElementById('cardName').value || "匿名小妹";
            const sign = document.getElementById('cardSign').value || "不被定义的自己";
            const hair = document.getElementById('cardHair').value || "甜丧粉黑风";
            const love = document.getElementById('cardLove').value || "伤感文案｜土酷穿搭｜非主流自拍";

            const canvas = document.getElementById('cardCanvas');
            canvas.width = 750;
            canvas.height = 1334;
            const ctx = canvas.getContext('2d');

            // 渐变背景
            const grad = ctx.createLinearGradient(0,0,750,1334);
            grad.addColorStop(0,"#ff2e92");
            grad.addColorStop(1,"#000");
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,750,1334);

            // 文字绘制
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 50px 微软雅黑";
            ctx.fillText(name,375,450);

            ctx.fillStyle = "#ffb8d8";
            ctx.font = "26px 微软雅黑";
            ctx.fillText(sign,375,510);

            ctx.fillStyle = "#fff";
            ctx.font = "30px 微软雅黑";
            ctx.fillText("风格标签："+hair,375,620);

            ctx.font = "24px 微软雅黑";
            ctx.fillStyle = "#ffb8d8";
            ctx.fillText("我的喜好",375,720);

            // 自动换行
            let line = "";
            let y = 770;
            for(let word of love){
                let test = line + word;
                if(ctx.measureText(test).width > 650){
                    ctx.fillText(line,375,y);
                    line = word;
                    y += 40;
                }else line = test;
            }
            ctx.fillText(line,375,y);

            ctx.font = "22px 微软雅黑";
            ctx.fillStyle = "#fff";
            ctx.fillText("精神小妹专属天地 · 个人名片",375,1250);

            // 下载图片
            const a = document.createElement('a');
            a.download = "个人资料卡.png";
            a.href = canvas.toDataURL("image/png");
            a.click();
        }

        // 漂浮爱心
        function createHeart(){
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random()*100+'vw';
            heart.style.fontSize = Math.random()*20+10+'px';
            heart.style.color = ['#ff2e92','#d83cff','#ffd700'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),8000);
        }
        setInterval(createHeart,300);

        // 全局主题切换函数（所有页面通用）
        function toggleTheme(){
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }
    </script>
</body>
</html>
