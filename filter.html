<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线滤镜 - 精神小妹专属天地</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body.dark{background:#0a0a0a;color:#fff;}
        body.light{background:#fff0f6;color:#111;}
        .heart{position:fixed;pointer-events:none;animation:heartMove 8s linear infinite;opacity:0.7;z-index:-1;}
        @keyframes heartMove{
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
        }
        .neon-text{
            font-size:32px;font-weight:bold;
            color:#fff;
            text-shadow:
                0 0 5px #ff2e92,
                0 0 10px #ff2e92,
                0 0 20px #ff2e92,
                0 0 40px #d83cff;
        }
        .notice{
            width:100%;height:35px;background:#ff2e92;line-height:35px;overflow:hidden;
        }
        .notice-scroll{
            white-space:nowrap;animation:scroll 20s linear infinite;color:#111;font-weight:bold;
        }
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        nav{width:100%;background:#181818;padding:15px 0;text-align:center;border-bottom:2px solid #ff2e92;}
        nav a{
            color:#ffb8d8;text-decoration:none;font-size:16px;margin:0 12px;padding:8px 14px;
            border-radius:20px;transition:0.3s;
        }
        nav a:hover{background:#ff2e92;color:#000;box-shadow:0 0 12px #ff2e92;}
        .box{
            width:90%;max-width:1200px;margin:30px auto;background:#151515;padding:25px;
            border-radius:18px;border:1px solid #ff2e9280;box-shadow:0 0 25px #d83cff40;
        }
        .box h2{margin-bottom:20px;color:#ff2e92;border-left:4px solid #ff2e92;padding-left:10px;}
        canvas{max-width:100%;border-radius:12px;margin:15px 0;}
        .btn{
            display:inline-block;padding:10px 22px;background:linear-gradient(45deg,#ff2e92,#d83cff);
            color:#000;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:8px;
            transition:0.3s;
        }
        .btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff2e92;}
        .theme-toggle{
            position:fixed;top:15px;right:15px;z-index:999;
        }
        footer{margin-top:50px;padding:20px;text-align:center;color:#aaa;font-size:14px;border-top:1px solid #222;}
    </style>
</head>
<body class="dark">
    <div class="notice">
        <div class="notice-scroll">在线修图滤镜｜暗黑/粉调/复古非主流｜加闪粉边框｜导出保存图片</div>
    </div>

    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()">切换夜间模式</button>
    </div>

    <div style="text-align:center;margin:25px 0;">
        <h1 class="neon-text">在线图片滤镜</h1>
        <p style="color:#ffb8d8;margin-top:8px;">一键调出非主流氛围感照片</p>
    </div>

    <nav>
        <a href="index.html">首页</a>
        <a href="avatar.html">头像馆</a>
        <a href="yulu.html">伤感语录</a>
        <a href="dress.html">穿搭分享</a>
        <a href="submit.html">自拍投稿</a>
        <a href="music.html">音乐播放器</a>
        <a href="message.html">留言板</a>
        <a href="material.html">素材下载</a>
        <a href="filter.html">在线滤镜</a>
        <a href="card.html">个人资料卡</a>
    </nav>

    <div class="box">
        <h2>上传图片</h2>
        <input type="file" id="filterImgInput" accept="image/*">
        <canvas id="filterCanvas"></canvas>
        <div>
            <button class="btn" onclick="filterDark()">暗黑丧系滤镜</button>
            <button class="btn" onclick="filterPink()">粉甜非主流滤镜</button>
            <button class="btn" onclick="filterVintage()">复古怀旧滤镜</button>
            <button class="btn" onclick="saveFilterImg()">保存修完图片</button>
        </div>
    </div>

    <footer>
        精神小妹专属天地 © 2026
    </footer>

    <script>
        const canvas = document.getElementById('filterCanvas');
        const ctx = canvas.getContext('2d');
        let originImg = null;

        // 上传图片
        document.getElementById('filterImgInput').onchange = function(e){
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = ev=>{
                originImg = new Image();
                originImg.src = ev.target.result;
                originImg.onload = ()=>{
                    canvas.width = originImg.width;
                    canvas.height = originImg.height;
                    ctx.drawImage(originImg,0,0);
                }
            }
            reader.readAsDataURL(file);
        }

        // 暗黑滤镜
        function filterDark(){
            if(!originImg) return alert("请先上传图片");
            ctx.drawImage(originImg,0,0);
            const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            const data = imgData.data;
            for(let i=0;i<data.length;i+=4){
                data[i] = data[i] * 0.4;
                data[i+1] = data[i+1] * 0.4;
                data[i+2] = data[i+2] * 0.6;
            }
            ctx.putImageData(imgData,0,0);
        }
        // 粉色滤镜
        function filterPink(){
            if(!originImg) return alert("请先上传图片");
            ctx.drawImage(originImg,0,0);
            const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            const data = imgData.data;
            for(let i=0;i<data.length;i+=4){
                data[i] = Math.min(255, data[i] + 60);
                data[i+2] = Math.min(255, data[i+2] + 40);
            }
            ctx.putImageData(imgData,0,0);
        }
        // 复古滤镜
        function filterVintage(){
            if(!originImg) return alert("请先上传图片");
            ctx.drawImage(originImg,0,0);
            const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
            const data = imgData.data;
            for(let i=0;i<data.length;i+=4){
                let r = data[i],g=data[i+1],b=data[i+2];
                data[i] = r*0.393 + g*0.769 + b*0.189;
                data[i+1] = r*0.349 + g*0.686 + b*0.168;
                data[i+2] = r*0.272 + g*0.534 + b*0.131;
            }
            ctx.putImageData(imgData,0,0);
        }
        // 保存图片
        function saveFilterImg(){
            const link = document.createElement('a');
            link.download = "滤镜自拍.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // 漂浮爱心
        function createHeart(){
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random()*100+'vw';
            heart.style.fontSize = Math.random()*20+10+'px';
            heart.style.color = ['#ff2e92','#d83cff','#ffd700'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),8000);
        }
        setInterval(createHeart,300);

        function toggleTheme(){
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }
    </script>
</body>
</html>
