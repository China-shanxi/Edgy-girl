<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穿搭分享 - 精神小妹专属天地</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body.dark{background:#0a0a0a;color:#fff;}
        body.light{background:#fff0f6;color:#111;}
        .heart{position:fixed;pointer-events:none;animation:heartMove 8s linear infinite;opacity:0.7;z-index:-1;}
        @keyframes heartMove{
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
        }
        .neon-text{
            font-size:32px;font-weight:bold;
            color:#fff;
            text-shadow:
                0 0 5px #ff2e92,
                0 0 10px #ff2e92,
                0 0 20px #ff2e92,
                0 0 40px #d83cff;
        }
        .notice{
            width:100%;height:35px;background:#ff2e92;line-height:35px;overflow:hidden;
        }
        .notice-scroll{
            white-space:nowrap;animation:scroll 20s linear infinite;color:#111;font-weight:bold;
        }
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        nav{width:100%;background:#181818;padding:15px 0;text-align:center;border-bottom:2px solid #ff2e92;}
        nav a{
            color:#ffb8d8;text-decoration:none;font-size:16px;margin:0 12px;padding:8px 14px;
            border-radius:20px;transition:0.3s;
        }
        nav a:hover{background:#ff2e92;color:#000;box-shadow:0 0 12px #ff2e92;}
        .box{
            width:90%;max-width:1200px;margin:30px auto;background:#151515;padding:25px;
            border-radius:18px;border:1px solid #ff2e9280;box-shadow:0 0 25px #d83cff40;
        }
        .box h2{margin-bottom:20px;color:#ff2e92;border-left:4px solid #ff2e92;padding-left:10px;}
        .dress-card{
            background:#0f0f0f;
            padding:20px;
            border-radius:12px;
            margin-bottom:20px;
            border:1px solid #ff2e9260;
        }
        .dress-card img{
            width:100%;
            height:260px;
            object-fit:cover;
            border-radius:10px;
        }
        .btn{
            display:inline-block;padding:10px 22px;background:linear-gradient(45deg,#ff2e92,#d83cff);
            color:#000;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:8px;
            transition:0.3s;
        }
        .btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff2e92;}
        .theme-toggle{
            position:fixed;top:15px;right:15px;z-index:999;
        }
        footer{margin-top:50px;padding:20px;text-align:center;color:#aaa;font-size:14px;border-top:1px solid #222;}
    </style>
</head>
<body class="dark">
    <div class="notice">
        <div class="notice-scroll">穿搭分享｜土酷辣妹｜低腰裤｜吊带｜彩色染发｜亚文化配饰｜平价穿搭教程｜商品跳转</div>
    </div>

    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()">切换夜间模式</button>
    </div>

    <div style="text-align:center;margin:25px 0;">
        <h1 class="neon-text">穿搭分享</h1>
        <p style="color:#ffb8d8;margin-top:8px;">今天也要做有风格的精神小妹</p>
    </div>

    <nav>
        <a href="index.html">首页</a>
        <a href="avatar.html">头像馆</a>
        <a href="yulu.html">伤感语录</a>
        <a href="dress.html">穿搭分享</a>
        <a href="submit.html">自拍投稿</a>
        <a href="music.html">音乐播放器</a>
        <a href="message.html">留言板</a>
        <a href="material.html">素材下载</a>
        <a href="filter.html">在线滤镜</a>
        <a href="card.html">个人资料卡</a>
    </nav>

    <div class="box">
        <h2>今日穿搭推荐</h2>
        <div id="dressList"></div>
    </div>

    <footer>
        精神小妹专属天地 © 2026
    </footer>

    <script>
        const dressData = [
            {
                img:'https://picsum.photos/id/1011/1200/400',
                title:'甜丧辣妹风',
                desc:'黑色短T搭配低腰牛仔裤，配上银色耳环和小链条，甜中带丧。',
                link:'https://www.taobao.com'
            },
            {
                img:'https://picsum.photos/id/1025/1200/400',
                title:'粉黑甜酷风',
                desc:'粉色吊带外搭黑色防晒衫，搭配彩色发夹，拍照很有氛围感。',
                link:'https://www.taobao.com'
            },
            {
                img:'https://picsum.photos/id/1027/1200/400',
                title:'暗黑非主流风',
                desc:'黑色长裙搭配银色腰链，妆容用冷调眼影，适合夜晚拍照。',
                link:'https://www.taobao.com'
            },
            {
                img:'https://picsum.photos/id/1029/1200/400',
                title:'彩色亚文化风',
                desc:'亮色外套搭配半框眼镜和彩色袜子，整体更有青春感。',
                link:'https://www.taobao.com'
            }
        ];

        function renderDress(){
            const list = document.getElementById('dressList');
            list.innerHTML = '';
            dressData.forEach(item=>{
                const card = document.createElement('div');
                card.className = 'dress-card';
                card.innerHTML = `
                    <img src="${item.img}" alt="${item.title}">
                    <h3 style="color:#ff2e92;margin:15px 0;">${item.title}</h3>
                    <p style="color:#ffb8d8;line-height:1.8;">${item.desc}</p>
                    <a href="${item.link}" target="_blank" class="btn">查看同款搭配</a>
                `;
                list.appendChild(card);
            });
        }

        function createHeart(){
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random()*100+'vw';
            heart.style.fontSize = Math.random()*20+10+'px';
            heart.style.color = ['#ff2e92','#d83cff','#ffd700'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),8000);
        }
        setInterval(createHeart,300);

        function toggleTheme(){
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        renderDress();
    </script>
</body>
</html>
