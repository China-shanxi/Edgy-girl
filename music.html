<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器 - 精神小妹专属天地</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body.dark{background:#0a0a0a;color:#fff;}
        body.light{background:#fff0f6;color:#111;}
        .heart{position:fixed;pointer-events:none;animation:heartMove 8s linear infinite;opacity:0.7;z-index:-1;}
        @keyframes heartMove{
            0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
            10%{opacity:1;}
            90%{opacity:1;}
            100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
        }
        .neon-text{
            font-size:32px;font-weight:bold;
            color:#fff;
            text-shadow:
                0 0 5px #ff2e92,
                0 0 10px #ff2e92,
                0 0 20px #ff2e92,
                0 0 40px #d83cff;
        }
        .notice{
            width:100%;height:35px;background:#ff2e92;line-height:35px;overflow:hidden;
        }
        .notice-scroll{
            white-space:nowrap;animation:scroll 20s linear infinite;color:#111;font-weight:bold;
        }
        @keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
        nav{width:100%;background:#181818;padding:15px 0;text-align:center;border-bottom:2px solid #ff2e92;}
        nav a{
            color:#ffb8d8;text-decoration:none;font-size:16px;margin:0 12px;padding:8px 14px;
            border-radius:20px;transition:0.3s;
        }
        nav a:hover{background:#ff2e92;color:#000;box-shadow:0 0 12px #ff2e92;}
        .box{
            width:90%;max-width:1200px;margin:30px auto;background:#151515;padding:25px;
            border-radius:18px;border:1px solid #ff2e9280;box-shadow:0 0 25px #d83cff40;
        }
        .box h2{margin-bottom:20px;color:#ff2e92;border-left:4px solid #ff2e92;padding-left:10px;}
        .btn{
            display:inline-block;padding:10px 22px;background:linear-gradient(45deg,#ff2e92,#d83cff);
            color:#000;border:none;border-radius:30px;font-weight:bold;cursor:pointer;margin:8px;
            transition:0.3s;
        }
        .btn:hover{transform:scale(1.05);box-shadow:0 0 15px #ff2e92;}
        .theme-toggle{
            position:fixed;top:15px;right:15px;z-index:999;
        }
        footer{margin-top:50px;padding:20px;text-align:center;color:#aaa;font-size:14px;border-top:1px solid #222;}
    </style>
</head>
<body class="dark">
    <div class="notice">
        <div class="notice-scroll">音乐播放器｜非主流DJ｜伤感网络歌曲｜喊麦｜土酷BGM｜emo纯音乐｜收藏歌曲</div>
    </div>

    <div class="theme-toggle">
        <button class="btn" onclick="toggleTheme()">切换夜间模式</button>
    </div>

    <div style="text-align:center;margin:25px 0;">
        <h1 class="neon-text">音乐播放器</h1>
        <p style="color:#ffb8d8;margin-top:8px;">戴上耳机，进入精神小妹频道</p>
    </div>

    <nav>
        <a href="index.html">首页</a>
        <a href="avatar.html">头像馆</a>
        <a href="yulu.html">伤感语录</a>
        <a href="dress.html">穿搭分享</a>
        <a href="submit.html">自拍投稿</a>
        <a href="music.html">音乐播放器</a>
        <a href="message.html">留言板</a>
        <a href="material.html">素材下载</a>
        <a href="filter.html">在线滤镜</a>
        <a href="card.html">个人资料卡</a>
    </nav>

    <div class="box">
        <h2>正在播放</h2>
        <p id="musicTitle" style="font-size:20px;color:#ffb8d8;margin:15px 0;">SoundHelix Song 1</p>
        <audio id="musicPlayer" controls style="width:100%;">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
        </audio>
        <div style="margin:15px 0;">
            <button class="btn" onclick="prevMusic()">上一首</button>
            <button class="btn" onclick="togglePlay()">播放/暂停</button>
            <button class="btn" onclick="nextMusic()">下一首</button>
            <button class="btn" onclick="toggleLoop()">循环播放</button>
        </div>
    </div>

    <div class="box">
        <h2>歌单列表</h2>
        <div id="musicList"></div>
    </div>

    <footer>
        精神小妹专属天地 © 2026
    </footer>

    <script>
        const musicData = [
            {title:'SoundHelix Song 1', src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'},
            {title:'SoundHelix Song 2', src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'},
            {title:'SoundHelix Song 3', src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'},
            {title:'SoundHelix Song 4', src:'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'}
        ];

        let currentIndex = 0;
        let isLoop = false;
        const player = document.getElementById('musicPlayer');

        function renderMusicList(){
            const list = document.getElementById('musicList');
            list.innerHTML = '';
            musicData.forEach((item,i)=>{
                const p = document.createElement('p');
                p.style.padding = '12px';
                p.style.background = '#0f0f0f';
                p.style.borderRadius = '8px';
                p.style.margin = '8px 0';
                p.style.color = '#ffb8d8';
                p.style.cursor = 'pointer';
                p.innerText = item.title;
                p.onclick = function(){
                    playMusic(i);
                }
                list.appendChild(p);
            });
        }

        function playMusic(index){
            currentIndex = index;
            player.src = musicData[index].src;
            document.getElementById('musicTitle').innerText = musicData[index].title;
            player.play();
        }

        function togglePlay(){
            if(player.paused) player.play();
            else player.pause();
        }

        function nextMusic(){
            currentIndex = (currentIndex + 1) % musicData.length;
            playMusic(currentIndex);
        }

        function prevMusic(){
            currentIndex = (currentIndex - 1 + musicData.length) % musicData.length;
            playMusic(currentIndex);
        }

        function toggleLoop(){
            isLoop = !isLoop;
            player.loop = isLoop;
            alert(isLoop ? '已开启循环播放' : '已关闭循环播放');
        }

        player.addEventListener('ended',function(){
            if(!isLoop) nextMusic();
        });

        function createHeart(){
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random()*100+'vw';
            heart.style.fontSize = Math.random()*20+10+'px';
            heart.style.color = ['#ff2e92','#d83cff','#ffd700'][Math.floor(Math.random()*3)];
            document.body.appendChild(heart);
            setTimeout(()=>heart.remove(),8000);
        }
        setInterval(createHeart,300);

        function toggleTheme(){
            document.body.classList.toggle('dark');
            document.body.classList.toggle('light');
        }

        renderMusicList();
    </script>
</body>
</html>
